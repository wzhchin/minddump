# Detekt 配置 — MindDump

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - 'Composable'
  MatchingDeclarationName:
    active: false

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  UnusedPrivateMember:
    active: true
  UnusedParameter:
    active: true
  ReturnCount:
    active: true
    max: 5
  ThrowsCount:
    active: true
    max: 3
  WildcardImport:
    active: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LargeClass:
    active: true
    threshold: 600
  LongMethod:
    active: true
    threshold: 185
  LongParameterList:
    active: true
    functionThreshold: 11
    constructorThreshold: 7
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 35
    thresholdInClasses: 35
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 5

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: true

empty-blocks:
  active: true

potential-bugs:
  active: true

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
